version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cie10-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres123}
      POSTGRES_DB: ${DB_NAME:-agnodishub}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: cie10-api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres123}
      DB_NAME: ${DB_NAME:-agnodishub}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db

volumes:
  postgres_data:
